<!doctype html>
<html lang="pl">
<head>
  <title>Zbychowanie2026</title>
  <meta charset='UTF-8'>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      background-color: #f0f0f0;
    }
    .hello-message {
      margin: 40px;
      text-align: center;
    }
    .logout-messages {
      pointer-events: none;
      color: red;
      margin: 40px;
      position: fixed;
      top: 0;
      left: 0;
      font-weight: bold;
      z-index: 9999;
      text-shadow: 2px 2px #FFF, 4px 4px 10px #000;
    }
    img {
      width: 300px;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      cursor: pointer;
    }
    h1 { color: #00aaff; }
    
    @keyframes blurslowly {
      0% { filter: none; }
      92% { filter: blur(0); }
      96% { filter: blur(2px); }
      100% { filter: blur(0); }
    }
    body {
      animation: blurslowly 15s infinite;
    }
  </style>
  
  <link rel="icon" type="image/png" href="Zbych.png">

  <meta property="og:title" content="Zbychowanie2026" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="Zbych.png" />
  <meta property="og:description" content="Wejdź i zobacz co przygotował Zbychu!" />
  <meta name="theme-color" content="#00aaff">
</head>
<body>

<noscript>
  <div style="text-align: center; margin-top: 50px;">
    <h1>Włącz JavaScript!</h1>
    <p>Bez tego Zbychu nie może Cię odwiedzić.</p>
  </div>
</noscript>

<template id="main-template">
  <div class='hello-message'>
    <h1>Siemano kolano w Zbychowanie2026!</h1>
    <h2>We no walnij 3 razy w spacje...</h2>
    <h3>(albo kliknij w Zbycha poniżej)</h3>

    <img src='Zbych.png' alt='Zbychu' id="start-img" />
  </div>
  
  <div class='logout-messages'></div>
</template>

<div id="app"></div>

<script>
  // Mały pomocnik, który ładuje template do DOM
  const temp = document.getElementById('main-template');
  const clon = temp.content.cloneNode(true);
  document.getElementById('app').appendChild(clon);
</script>

<script src='Index.js'></script>

</body>
</html>
